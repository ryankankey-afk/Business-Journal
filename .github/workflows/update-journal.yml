name: Update Centerline Journal

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate journal
        run: python generate_journal.py

      - name: Commit and push if changed
        run: |
          git config user.name "centerline-bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update journal $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
